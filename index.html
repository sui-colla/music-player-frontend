<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8f9fd" />
    <title>StarFile 音乐播放器</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">♫</div>
          <div>
            <h1>StarFile</h1>
            <p>StarFile Music</p>
          </div>
        </div>

        <nav class="nav-list">
          <button class="nav-item active" type="button" data-view="home">
            <span class="nav-icon" aria-hidden="true">⌂</span>
            <span>首页</span>
          </button>
          <button class="nav-item" type="button" data-view="library">
            <span class="nav-icon" aria-hidden="true">☆</span>
            <span>歌单</span>
          </button>
          <button class="nav-item" type="button" data-view="favorites">
            <span class="nav-icon" aria-hidden="true">♡</span>
            <span>排行榜</span>
          </button>
          <button class="nav-item" type="button" data-view="recent">
            <span class="nav-icon" aria-hidden="true">◷</span>
            <span>歌手</span>
          </button>
          <button class="nav-item" type="button" data-view="queue">
            <span class="nav-icon" aria-hidden="true">☷</span>
            <span>电台</span>
          </button>
          <button class="nav-item" type="button" data-view="playlist">
            <span class="nav-icon" aria-hidden="true">▣</span>
            <span>视频</span>
          </button>
        </nav>

        <section class="playlist-preview" aria-label="你的音乐">
          <div class="sidebar-heading">
            <span>我的音乐</span>
          </div>
          <button class="playlist-card active" type="button" data-view="playlist">
            <img src="./src/assets/covers/signal.svg" alt="" />
            <span>
              <strong>我喜欢的音乐</strong>
              <small>收藏歌曲</small>
            </span>
          </button>
          <button class="playlist-card" type="button" data-view="recent">
            <img src="./src/assets/covers/night.svg" alt="" />
            <span>
              <strong>本地音乐</strong>
              <small>导入歌曲</small>
            </span>
          </button>
          <button class="playlist-card" type="button" data-view="recent">
            <img src="./src/assets/covers/coast.svg" alt="" />
            <span>
              <strong>最近播放</strong>
              <small>播放历史</small>
            </span>
          </button>
          <button class="playlist-card" type="button" data-view="library">
            <img src="./src/assets/covers/beat.svg" alt="" />
            <span>
              <strong>下载管理</strong>
              <small>本机歌曲</small>
            </span>
          </button>
        </section>

        <section class="playlist-preview created-playlists" aria-label="创建的歌单">
          <div class="sidebar-heading">
            <span>创建的歌单</span>
            <span aria-hidden="true">＋</span>
          </div>
          <button class="playlist-card" type="button" data-view="playlist">
            <img src="./src/assets/covers/signal.svg" alt="" />
            <span>
              <strong>工作专注</strong>
              <small>歌单</small>
            </span>
          </button>
          <button class="playlist-card" type="button" data-view="playlist">
            <img src="./src/assets/covers/night.svg" alt="" />
            <span>
              <strong>放松时刻</strong>
              <small>歌单</small>
            </span>
          </button>
          <button class="playlist-card" type="button" data-view="playlist">
            <img src="./src/assets/covers/coast.svg" alt="" />
            <span>
              <strong>夜晚旋律</strong>
              <small>歌单</small>
            </span>
          </button>
        </section>

        <section class="mini-panel controls-panel">
          <form class="playlist-form" id="playlistForm">
            <input id="playlistNameInput" type="text" maxlength="18" placeholder="歌单名称" />
            <button class="mode-button compact" type="submit">创建</button>
          </form>
          <input id="songFileInput" class="visually-hidden" type="file" accept="audio/*,.mp3,.wav,.ogg,.m4a,.aac,.flac,.webm,.lrc" multiple />
          <button class="mode-button" id="playModeButton" type="button">顺序播放</button>
          <label class="theme-toggle">
            <span id="themeLabel">深色模式</span>
            <input id="themeToggle" type="checkbox" aria-label="切换浅色主题" />
            <span class="switch-track" aria-hidden="true">
              <span class="switch-thumb"></span>
            </span>
          </label>
        </section>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <label class="search-box" aria-label="搜索歌曲或歌手">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="搜索歌曲 / 歌手 / 歌单" />
          </label>
          <div class="topbar-actions">
            <button class="mode-button import-button top-import-button" id="importSongButton" type="button">导入歌曲</button>
            <button class="top-icon-button" type="button" aria-label="通知">♧</button>
            <button class="top-icon-button" type="button" aria-label="外观">♙</button>
            <button class="top-icon-button window-button" type="button" aria-label="最小化">−</button>
            <button class="top-icon-button window-button" type="button" aria-label="最大化">□</button>
            <button class="top-icon-button window-button" type="button" aria-label="关闭">×</button>
          </div>
        </header>

        <section class="hero-strip" aria-label="当前播放">
          <div class="hero-copy">
            <p class="eyebrow" id="viewTitle">精选推荐</p>
            <h2 id="heroTitle">追逐光芒</h2>
            <p id="heroArtist">星野爱 · Oshi no Ko</p>
            <button class="hero-play" id="heroActionButton" type="button">
              <span aria-hidden="true">▶</span>
              <span>播放</span>
            </button>
          </div>
          <div class="hero-character" aria-label="星野爱人物主视觉占位区">
            <div class="character-glow" aria-hidden="true"></div>
            <img src="./src/assets/hero/hoshino-ai-reference.jpg" alt="星野爱" />
          </div>
          <img id="heroCover" src="./src/assets/covers/signal.svg" alt="当前歌曲封面" />
          <div class="hero-dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </section>

        <section class="content-grid">
          <div class="song-section">
            <div class="section-heading">
              <h3 id="listTitle">推荐歌曲</h3>
              <span id="songCount">0 首</span>
            </div>
            <div class="song-table" id="songList" aria-live="polite"></div>
          </div>

          <aside class="queue-panel">
            <div class="section-heading">
              <h3>播放队列</h3>
              <span id="queueCount">0 首</span>
            </div>
            <div id="queueList" class="queue-list"></div>

            <div class="section-heading lyric-heading">
              <h3>歌词</h3>
              <span id="lyricStatus">未播放</span>
            </div>
            <div id="lyricList" class="lyric-list"></div>
          </aside>
        </section>
      </main>

      <footer class="player-bar">
        <div class="now-playing">
          <img id="playerCover" src="./src/assets/covers/signal.svg" alt="歌曲封面" />
          <div>
            <strong id="playerTitle">未播放</strong>
            <span id="playerArtist">请选择歌曲</span>
          </div>
        </div>

        <div class="player-controls">
          <div class="control-row">
            <button id="prevButton" class="icon-button" type="button" aria-label="上一首">⏮</button>
            <button id="playButton" class="play-button" type="button" aria-label="播放">▶</button>
            <button id="nextButton" class="icon-button" type="button" aria-label="下一首">⏭</button>
          </div>
          <div id="playbackStatus" class="playback-status" role="status" aria-live="polite">准备就绪</div>
          <div class="progress-row">
            <span id="currentTime">0:00</span>
            <input id="progressInput" type="range" min="0" max="100" value="0" step="1" aria-label="播放进度" />
            <span id="durationTime">0:00</span>
          </div>
        </div>

        <div class="volume-control">
          <button id="muteButton" class="icon-button" type="button" aria-label="静音">🔊</button>
          <input id="volumeInput" type="range" min="0" max="1" value="0.8" step="0.01" aria-label="音量" />
        </div>
      </footer>

      <audio id="audioPlayer" preload="metadata"></audio>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>

      <div id="importDialog" class="import-dialog" aria-hidden="true">
        <form class="import-panel" id="importForm" aria-label="导入本地歌曲">
          <div class="import-heading">
            <div>
              <h3>导入歌曲</h3>
              <p>补全歌曲信息后保存到本机浏览器</p>
            </div>
            <button class="icon-button" id="importCloseButton" type="button" aria-label="关闭导入窗口">×</button>
          </div>
          <div class="import-rows" id="importRows"></div>
          <div class="import-actions">
            <button class="mode-button" id="importCancelButton" type="button">取消</button>
            <button class="mode-button primary" type="submit">确认导入</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
